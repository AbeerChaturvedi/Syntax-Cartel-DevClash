# ═══════════════════════════════════════════════════════════════════════
#  Project Velure — Postgres backup overlay
#
#  Adds a sidecar that runs pg_dump → gzip on a schedule with retention.
#  Optional S3 offsite copy if BACKUP_S3_URI + AWS creds are provided.
#
#  Usage:
#    docker compose --env-file .env.prod \
#      -f docker-compose.prod.yml \
#      -f docker-compose.backup.yml \
#      up -d
#
#  Tunables (env or .env.prod):
#    BACKUP_INTERVAL_SEC      — default 86400 (daily)
#    BACKUP_RETENTION_COUNT   — default 14
#    BACKUP_S3_URI            — optional, e.g. s3://my-bucket/velure
#    AWS_ACCESS_KEY_ID,
#    AWS_SECRET_ACCESS_KEY,
#    AWS_DEFAULT_REGION       — required only if BACKUP_S3_URI set
# ═══════════════════════════════════════════════════════════════════════

services:
  postgres-backup:
    build:
      context: ./deploy/postgres-backup
      dockerfile: Dockerfile
    restart: always
    environment:
      POSTGRES_HOST:           postgres
      POSTGRES_PORT:           "5432"
      POSTGRES_DB:             ${POSTGRES_DB:?}
      POSTGRES_USER:           ${POSTGRES_USER:?}
      POSTGRES_PASSWORD:       ${POSTGRES_PASSWORD:?}
      BACKUP_DIR:              /backups
      BACKUP_INTERVAL_SEC:     ${BACKUP_INTERVAL_SEC:-86400}
      BACKUP_RETENTION_COUNT:  ${BACKUP_RETENTION_COUNT:-14}
      BACKUP_S3_URI:           ${BACKUP_S3_URI:-}
      AWS_ACCESS_KEY_ID:       ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY:   ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION:      ${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - velure_internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

volumes:
  postgres_backups:
